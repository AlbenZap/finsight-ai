<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>
  <!-- Candlestick chart: 3 bars -->
  <!-- Bar 1 (left, red/down) -->
  <rect x="5" y="14" width="4" height="10" rx="1" fill="#f87171"/>
  <line x1="7" y1="12" x2="7" y2="14" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="24" x2="7" y2="26" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bar 2 (middle, green/up) -->
  <rect x="14" y="10" width="4" height="12" rx="1" fill="#34d399"/>
  <line x1="16" y1="7" x2="16" y2="10" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="16" y2="25" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bar 3 (right, green/up) -->
  <rect x="23" y="8" width="4" height="14" rx="1" fill="#60a5fa"/>
  <line x1="25" y1="5" x2="25" y2="8" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="22" x2="25" y2="25" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
</svg>
